<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NextBus SG🚏</title>
    <link rel="icon" href="NextBus SG Icon.png" type="image/x-icon" />
    <script src="https://cdn.jsdelivr.net/npm/handlebars@latest/dist/handlebars.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>
    <style type="text/css">
      .tftable {
        font-size: 14px;
        color: #333333;
        width: 100%;
        border-width: 1px;
        border-color: #87ceeb;
        border-collapse: collapse;
      }
      .tftable th {
        font-size: 18px;
        background-color: #87ceeb;
        border-width: 1px;
        padding: 8px;
        border-style: solid;
        border-color: #87ceeb;
        text-align: left;
      }
      .tftable tr {
        background-color: #ffffff;
      }
      .tftable td {
        font-size: 16px;
        border-width: 1px;
        padding: 8px;
        border-style: solid;
        border-color: #87ceeb;
      }
      .tftable tr:hover {
        background-color: #e0ffff;
      }
      .spinner {
        display: none;
        border: 4px solid #f3f3f3;
        border-radius: 50%;
        border-top: 4px solid #3498db;
        width: 40px;
        height: 40px;
        animation: spin 2s linear infinite;
        margin: 20px auto;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      .bus-info {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
      }
      .arrival-time {
        flex: 1;
      }
      .icons {
        margin-left: 10px;
        display: flex;
        align-items: center;
      }
      @media (max-width: 600px) {
        .bus-info {
          flex-direction: column;
          align-items: flex-start;
        }
        .icons {
          margin-left: 0;
          margin-top: 5px;
        }
      }
    </style>
  </head>
  <body>
    <h1>NextBus SG🚏</h1>
    <label for="busStopCode">Enter Bus Stop Code:</label>
    <input type="text" id="busStopCodeInput" size="5" />
    <button onclick="saveBusStop()"><i class="fa-sharp fa-regular fa-bookmark"></i></button>
    <button onclick="fetchBusArrival()">Get Arrival Timing</button>
    <br /><br />

    <div id="savedBusStops">
      <button id="savedBusStop1" onclick="fetchSavedBusStop(1)" style="display: none"></button>
      <button id="savedBusStop2" onclick="fetchSavedBusStop(2)" style="display: none"></button>
      <button id="savedBusStop3" onclick="fetchSavedBusStop(3)" style="display: none"></button>
    </div>
    <br />

    <div id="response">
      <div class="spinner" id="spinner"></div>
    </div>

    <script id="table-template" type="text/x-handlebars-template">
      <table class="tftable" border="1">
        <colgroup>
          <col style="width: 10%;" />
          <col style="width: 30%;" />
          <col style="width: 30%;" />
          <col style="width: 30%;" />
        </colgroup>
        <tr>
          <th>Bus No</th>
          <th>Next Bus</th>
          <th>Next Bus 2</th>
          <th>Next Bus 3</th>
        </tr>
        {{#each Services}}
          <tr>
            <td style="font-weight: bold;">{{ServiceNo}}</td>
            <td>
              <div class="bus-info">
                <span class="arrival-time">{{{formatTime NextBus.EstimatedArrival}}}</span>
                <span class="icons">{{loadIcon NextBus.Load}}{{wheelchairIcon NextBus.Feature}}{{busTypeIcon NextBus.Type}}</span>
              </div>
            </td>
            <td>
              <div class="bus-info">
                <span class="arrival-time">{{{formatTime NextBus2.EstimatedArrival}}}</span>
                <span class="icons">{{loadIcon NextBus2.Load}}{{wheelchairIcon NextBus2.Feature}}{{busTypeIcon NextBus2.Type}}</span>
              </div>
            </td>
            <td>
              <div class="bus-info">
                <span class="arrival-time">{{{formatTime NextBus3.EstimatedArrival}}}</span>
                <span class="icons">{{loadIcon NextBus3.Load}}{{wheelchairIcon NextBus3.Feature}}{{busTypeIcon NextBus3.Type}}</span>
              </div>
            </td>
          </tr>
        {{/each}}
      </table>
    </script>

    <script>
      Handlebars.registerHelper("formatTime", function (time) {
        if (!time) return "No Est. Available";
        const now = new Date();
        const arrivalTime = new Date(time);
        const diffInMinutes = Math.floor((arrivalTime - now) / 60000); // Round down to nearest minute
        return diffInMinutes > 1
          ? `${diffInMinutes} mins`
          : diffInMinutes === 1
          ? "1 min"
          : '<span style="font-weight: bold; color: #3CB371;">Arr</span>';
      });

      /*Handlebars.registerHelper("loadColor", function (load) {
        switch (load) {
          case "SEA":
            return "#3CB371"; // Medium Sea Green
          case "SDA":
            return "#B8860B"; // Dark Goldenrod
          case "LSD":
            return "#DC143C"; // Crimson
          default:
            return "black";
        }
      });*/

      Handlebars.registerHelper("loadIcon", function (load) {
        switch (load) {
          case "SEA":
            return "🟢🪑"; // Seats Available
          case "SDA":
            return "🟡🧍‍♂️"; // Standing Available
          case "LSD":
            return "🔴⚠️"; // Limited Standing
          default:
            return "";
        }
      });

      Handlebars.registerHelper("wheelchairIcon", function (wheelchair) {
        return wheelchair === "WAB" ? "|👨‍🦽" : "";
      });

      Handlebars.registerHelper("busTypeIcon", function (busType) {
        switch (busType) {
          case "SD":
            return "|🚌"; // Single Deck
          case "DD":
            return "|🚍"; // Double Deck
          case "BD":
            return "|🚐"; // Bendy
          default:
            return "";
        }
      });

      function renderSavedBusStopButtons() {
        const savedBusStops = JSON.parse(localStorage.getItem("savedBusStops")) || [];
        for (let i = 1; i <= 3; i++) {
          const button = document.getElementById(`savedBusStop${i}`);
          if (savedBusStops[i - 1]) {
            button.textContent = "Bus Stop: " + savedBusStops[i - 1];
            button.style.display = "inline-block";
          } else {
            button.style.display = "none";
          }
        }
      }

      // Init saved bus stop buttons on load
      window.onload = function () {
        renderSavedBusStopButtons();
      };

      function fetchBusArrival(savedBusStopCode) {
        const busStopCode = savedBusStopCode || document.getElementById("busStopCodeInput").value;
        if (!busStopCode || !/^\d{5}$/.test(busStopCode)) {
          alert("Please enter a valid 5-digit bus stop code.");
          return;
        }

        document.getElementById("response").innerHTML = '<div class="spinner" id="spinner"></div>';
        document.getElementById("spinner").style.display = "block";

        const queryParams = new URLSearchParams({ BusStopCode: busStopCode }).toString();

        fetch(`https://nextbus-sg.vercel.app/api/bus-arrival?${queryParams}`)
          .then((response) => {
            if (!response.ok) {
              throw new Error("Network error");
            }
            return response.json();
          })
          .then((result) => {
            if (result.Services && result.Services.length > 0) {
              result.Services.sort((a, b) => parseInt(a.ServiceNo) - parseInt(b.ServiceNo));

              document.getElementById("spinner").style.display = "none";

              const source = document.getElementById("table-template").innerHTML;
              const template = Handlebars.compile(source);
              const html = template(result);
              document.getElementById("response").innerHTML = html;

              const legend = `
                <div style="margin-top: 15px;">
                  <strong>Legend:</strong>
                  <div>🟢<span style="margin: 0 5px 0 1px;">🪑</span> Seats Available</div>
                  <div>🟡<span style="margin: 0 5px 0 3px;">🧍‍♂️</span> Standing Available</div>
                  <div>🔴⚠️ Limited Standing</div>
                  <div><span style="margin-left: 1px">👨‍🦽</span><span style="margin-left: 1px;"> Wheelchair Accessible</span></div>
                  <div>🚌 Single Deck Bus</div>
                  <div>🚍 Double Deck Bus</div>
                  <div>🚐 Bendy Bus</div>
                </div>
                `;
              document.getElementById("response").insertAdjacentHTML("beforeend", legend);
            } else {
              document.getElementById("response").innerText =
                "Invalid Bus Stop Code or No Bus Services Available";
            }
          })
          .catch((error) => {
            document.getElementById("spinner").style.display = "none";

            console.error("There was a problem with the fetch operation:", error);
            document.getElementById("response").innerText =
              "Something went wrong, please try again later.";
          });
      }

      function saveBusStop() {
        const busStopCode = document.getElementById("busStopCodeInput").value;
        if (!busStopCode || !/^\d{5}$/.test(busStopCode)) {
          alert("Please enter a valid 5-digit bus stop code.");
          return;
        }

        let savedBusStops = JSON.parse(localStorage.getItem("savedBusStops")) || [];

        if (savedBusStops.includes(busStopCode)) {
          const confirmDelete = confirm("Do you want to remove this saved bus stop?");
          if (confirmDelete) {
            savedBusStops = savedBusStops.filter((code) => code !== busStopCode);
            document.getElementById("busStopCodeInput").value = "";
            document.getElementById("response").innerHTML = '<div class="spinner" id="spinner"></div>';
          } else {
            return;
          }
        } else {
          if (savedBusStops.length >= 3) {
            const confirmDelete = confirm(
              "You can only save 3 bus stops. Do you want to remove the first saved bus stop?"
            );
            if (confirmDelete) {
              savedBusStops.shift();
            } else {
              return;
            }
          }
          savedBusStops.push(busStopCode);
        }
        localStorage.setItem("savedBusStops", JSON.stringify(savedBusStops));
        renderSavedBusStopButtons();
      }

      function fetchSavedBusStop(index) {
        const savedBusStops = JSON.parse(localStorage.getItem("savedBusStops")) || [];
        document.getElementById("busStopCodeInput").value = savedBusStops[index - 1];
        fetchBusArrival(savedBusStops[index - 1]);
      }
    </script>
  </body>
</html>
