<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bus Arrival Timing</title>
  </head>
  <body>
    <h1>Bus Arrival Timing</h1>
    <pre id="response"></pre>
    <script>
      const busStopCode = "03369";
      const apiPath = "v3/BusArrival";
      const queryParams = new URLSearchParams({ BusStopCode: busStopCode }).toString();

      fetch(`http://bus-arrival-timing.vercel.app/api/datamall?path=${apiPath}&${queryParams}`)
        .then((response) => response.json())
        .then((result) => {
          document.getElementById("response").innerText = JSON.stringify(result, null, 2);
        })
        .catch((error) => {
          console.error("There was a problem with the fetch operation:", error);
          document.getElementById("response").innerText = "Error fetching data";
        });
    </script>
  </body>
</html>
